server {
    listen 80;

    #server the built static fil
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    #proxy API request to API container
    location /api/ {
        proxy_pass http://api:8000;
    }

    #proxy health
    location /health {
        proxy_pass http://api:8000;
    }
}