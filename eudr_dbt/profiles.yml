# eudr_dbt/profiles.yml
eudr_dbt:                          # must match the 'profile:' name in dbt_project.yml
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: eudr
      schema: analytics          # dbt builds models here, separate from raw tables
      threads: 4